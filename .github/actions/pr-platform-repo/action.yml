name: pr-platform-repo
description: Check out the GitOps config repo, bump the kustomize image newTag for a component, and open a pull request.

inputs:
  platform-repo:
    description: Full name of the config repo (owner/repo).
    required: true
  platform-repo-token:
    description: PAT with repo + workflow scope on the config repo. Used for checkout, push, and gh pr create.
    required: true
  kustomization-path:
    description: Path to the kustomization.yaml in the config repo (e.g. app/backend/overlays/dev/kustomization.yaml).
    required: true
  image-kustomize-name:
    description: The `name:` value in the images[] entry to update (e.g. gitops-demo-backend).
    required: true
  new-tag:
    description: New tag to write into the images[] entry's newTag field.
    required: true
  component:
    description: Component label used in branch name, commit message, and PR title (e.g. backend, frontend).
    required: true
  release-tag:
    description: Release tag, used in branch name, commit message, and PR title.
    required: true
  source-run-url:
    description: URL of the calling workflow run, included in the PR body for traceability.
    required: true
  environment:
    description: Target environment overlay (e.g. dev, stage, prod). Used in branch name and PR title.
    required: true
  target-branch:
    description: Platform-repo branch the PR is opened against.
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Checkout platform repo
      uses: actions/checkout@v6.0.2
      with:
        repository: ${{ inputs.platform-repo }}
        token: ${{ inputs.platform-repo-token }}
        ref: ${{ inputs.target-branch }}
        path: platform-repo

    - name: Update kustomization and open PR
      shell: bash
      working-directory: platform-repo
      env:
        GH_TOKEN: ${{ inputs.platform-repo-token }}
        KUSTOMIZATION_PATH: ${{ inputs.kustomization-path }}
        IMAGE_KUSTOMIZE_NAME: ${{ inputs.image-kustomize-name }}
        NEW_TAG: ${{ inputs.new-tag }}
        COMPONENT: ${{ inputs.component }}
        RELEASE_TAG: ${{ inputs.release-tag }}
        SOURCE_RUN_URL: ${{ inputs.source-run-url }}
        PLATFORM_REPO: ${{ inputs.platform-repo }}
        ENVIRONMENT: ${{ inputs.environment }}
        TARGET_BRANCH: ${{ inputs.target-branch }}
      run: |
        set -euo pipefail

        if [ ! -f "$KUSTOMIZATION_PATH" ]; then
          echo "Kustomization not found: $KUSTOMIZATION_PATH" >&2
          exit 1
        fi

        # Ensure the images[] entry exists before we try to update it.
        match_count="$(yq eval "[.images[]? | select(.name == \"$IMAGE_KUSTOMIZE_NAME\")] | length" "$KUSTOMIZATION_PATH")"
        if [ "$match_count" = "0" ]; then
          echo "No images[] entry with name=$IMAGE_KUSTOMIZE_NAME in $KUSTOMIZATION_PATH" >&2
          exit 1
        fi

        yq eval -i \
          "(.images[] | select(.name == \"$IMAGE_KUSTOMIZE_NAME\").newTag) = \"$NEW_TAG\"" \
          "$KUSTOMIZATION_PATH"

        if git diff --quiet; then
          echo "newTag already set to $NEW_TAG; skipping PR."
          exit 0
        fi

        branch="release/${ENVIRONMENT}/${COMPONENT}-${RELEASE_TAG}"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b "$branch"
        git add "$KUSTOMIZATION_PATH"
        git commit -m "release(${ENVIRONMENT}/${COMPONENT}): ${RELEASE_TAG}"
        git push --set-upstream origin "$branch"

        body=$(printf '%s\n\n%s\n' \
          "Bump \`${IMAGE_KUSTOMIZE_NAME}\` newTag to \`${NEW_TAG}\` in \`${KUSTOMIZATION_PATH}\`." \
          "Triggered by: ${SOURCE_RUN_URL}")

        gh pr create \
          --repo "$PLATFORM_REPO" \
          --base "$TARGET_BRANCH" \
          --head "$branch" \
          --title "release(${ENVIRONMENT}/${COMPONENT}): ${RELEASE_TAG}" \
          --body "$body"

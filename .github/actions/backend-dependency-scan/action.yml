name: backend-dependency-scan
description: |
  Run OWASP Dependency Check on the backend Maven project.
  Build fails on CVSS >= 7 (configured in pom.xml under the `security` profile).
  Caller must run actions/checkout before invoking this action.

inputs:
  java-version:
    description: Java version to install.
    required: false
    default: "25"
  java-distribution:
    description: Java distribution for actions/setup-java.
    required: false
    default: temurin
  working-directory:
    description: Directory containing the Maven wrapper and pom.xml.
    required: false
    default: backend/app
  github-token:
    description: Token used to upload SARIF results to GitHub code scanning.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}

    - name: Cache Maven packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles(format('{0}/pom.xml', inputs.working-directory)) }}
        restore-keys: ${{ runner.os }}-m2-

    - name: Compute NVD cache date
      id: nvd-date
      shell: bash
      run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

    - name: Cache OWASP NVD data
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: ${{ runner.os }}-owasp-nvd-${{ steps.nvd-date.outputs.date }}
        restore-keys: ${{ runner.os }}-owasp-nvd-

    - name: OWASP Dependency Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        for attempt in 1 2 3; do
          ./mvnw -Psecurity \
            -Dformats=HTML,JSON,SARIF \
            dependency-check:check && exit 0
          echo "Attempt $attempt failed; sleeping before retry..."
          sleep $((attempt * 30))
        done
        exit 1

    - name: Upload dependency-check report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7.0.1
      with:
        name: backend-dependency-check-report
        path: |
          ${{ inputs.working-directory }}/target/dependency-check-report.html
          ${{ inputs.working-directory }}/target/dependency-check-report.json
          ${{ inputs.working-directory }}/target/dependency-check-report.sarif
        if-no-files-found: warn

    - name: Upload SARIF to code scanning
      if: always()
      uses: github/codeql-action/upload-sarif@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
      with:
        sarif_file: ${{ inputs.working-directory }}/target/dependency-check-report.sarif
        category: backend-dependency-check
        token: ${{ inputs.github-token }}

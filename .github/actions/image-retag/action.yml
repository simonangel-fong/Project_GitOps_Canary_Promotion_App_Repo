name: image-retag
description: Pull a source image, retag with a release tag (and optional floating tag), and push to the registry.

inputs:
  registry-namespace:
    description: Registry namespace/username (e.g. Docker Hub username or org). Will be lowercased and trimmed.
    required: true
  registry-username:
    description: Registry login username.
    required: true
  registry-password:
    description: Registry login password or token.
    required: true
  image-name:
    description: Image repository name under the namespace (e.g. gitops-risk-control-backend).
    required: true
  source-tag:
    description: Existing tag on the source image (e.g. main-<git-sha>).
    required: true
  release-tag:
    description: Release tag to publish (e.g. dev-v1.2.3).
    required: true
  floating-tag:
    description: Optional floating tag to also push (e.g. dev). Leave empty to skip.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Docker login
      uses: docker/login-action@v4.1.0
      with:
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Pull, retag, push
      shell: bash
      env:
        NAMESPACE_RAW: ${{ inputs.registry-namespace }}
        IMAGE_NAME: ${{ inputs.image-name }}
        SOURCE_TAG: ${{ inputs.source-tag }}
        RELEASE_TAG: ${{ inputs.release-tag }}
        FLOATING_TAG: ${{ inputs.floating-tag }}
      run: |
        set -euo pipefail
        namespace="$(echo "$NAMESPACE_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
        source_ref="${namespace}/${IMAGE_NAME}:${SOURCE_TAG}"
        release_ref="${namespace}/${IMAGE_NAME}:${RELEASE_TAG}"

        echo "Pulling $source_ref"
        docker pull "$source_ref"

        docker tag "$source_ref" "$release_ref"
        docker push "$release_ref"
        echo "Pushed $release_ref"

        if [ -n "$FLOATING_TAG" ]; then
          floating_ref="${namespace}/${IMAGE_NAME}:${FLOATING_TAG}"
          docker tag "$source_ref" "$floating_ref"
          docker push "$floating_ref"
          echo "Pushed $floating_ref"
        fi

name: 40-release

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to release.
        required: true
        type: choice
        options:
          - backend
          - frontend
          - both
      source-sha:
        description: Git sha used as the source image tag suffix (e.g. the commit sha published by 30-cd-build-test as main-<sha>).
        required: true
        type: string
      release-tag:
        description: Release tag to publish (e.g. dev-v1.2.3). Written verbatim into kustomize newTag.
        required: true
        type: string
      environment:
        description: Target environment overlay.
        required: true
        type: choice
        default: dev
        options:
          - dev

concurrency:
  group: release-${{ inputs.component }}-${{ inputs.release-tag }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  source-tag-prefix: main
  backend-image-name: gitops-risk-control-backend
  frontend-image-name: gitops-demo-frontend
  platform-repo: simonangel-fong/Project_GitOps_Risk_Control_Platform_Repo

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.set.outputs.components }}
    steps:
      - id: set
        shell: bash
        env:
          COMPONENT: ${{ inputs.component }}
        run: |
          case "$COMPONENT" in
            backend)  echo 'components=["backend"]' >> "$GITHUB_OUTPUT" ;;
            frontend) echo 'components=["frontend"]' >> "$GITHUB_OUTPUT" ;;
            both)     echo 'components=["backend","frontend"]' >> "$GITHUB_OUTPUT" ;;
            *)        echo "Unknown component: $COMPONENT" >&2; exit 1 ;;
          esac

  release:
    runs-on: ubuntu-latest
    needs: resolve-matrix
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.resolve-matrix.outputs.components) }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve component vars
        id: vars
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
          BACKEND_IMAGE: ${{ env.backend-image-name }}
          FRONTEND_IMAGE: ${{ env.frontend-image-name }}
        run: |
          set -euo pipefail
          if [ "$COMPONENT" = "backend" ]; then
            image_name="$BACKEND_IMAGE"
          else
            image_name="$FRONTEND_IMAGE"
          fi
          echo "image-name=$image_name" >> "$GITHUB_OUTPUT"
          echo "kustomization-path=apps/${COMPONENT}/overlays/${{ inputs.environment }}/kustomization.yaml" >> "$GITHUB_OUTPUT"

      - name: Mint platform-repo token
        id: platform-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.CONFIG_BOT_PRIVATE_KEY }}
          owner: simonangel-fong
          repositories: Project_GitOps_Platform_Repo

      - name: Docker login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify source image exists
        shell: bash
        env:
          NAMESPACE_RAW: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: ${{ steps.vars.outputs.image-name }}
          SOURCE_TAG: ${{ env.source-tag-prefix }}-${{ inputs.source-sha }}
        run: |
          set -euo pipefail
          namespace="$(echo "$NAMESPACE_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
          ref="${namespace}/${IMAGE_NAME}:${SOURCE_TAG}"
          echo "Inspecting $ref"
          docker buildx imagetools inspect "$ref"

      - name: Retag and push
        uses: ./.github/actions/image-retag
        with:
          registry-namespace: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image-name: ${{ steps.vars.outputs.image-name }}
          source-tag: ${{ env.source-tag-prefix }}-${{ inputs.source-sha }}
          release-tag: ${{ inputs.release-tag }}

      - name: Open config repo PR
        uses: ./.github/actions/pr-platform-repo
        with:
          platform-repo: ${{ env.platform-repo }}
          platform-repo-token: ${{ steps.platform-token.outputs.token }}
          kustomization-path: ${{ steps.vars.outputs.kustomization-path }}
          image-kustomize-name: ${{ steps.vars.outputs.image-name }}
          new-tag: ${{ inputs.release-tag }}
          component: ${{ matrix.component }}
          release-tag: ${{ inputs.release-tag }}
          source-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          environment: ${{ inputs.environment }}
          target-branch: ${{ inputs.environment }}
  notify:
    runs-on: ubuntu-latest
    needs:
      - resolve-matrix
      - release
    if: always()
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}

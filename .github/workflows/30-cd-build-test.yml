name: 30-cd-build-test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/**
      - .github/actions/**

concurrency:
  group: cd-build-test
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

env:
  backend-dockerfile-path: backend
  backend-image-name: gitops-demo-backend
  backend-image-tag: main
  frontend-dockerfile-path: frontend
  frontend-image-name: gitops-demo-frontend
  frontend-image-tag: main
  docker-compose-path: ci-test

jobs:
  # Backend Lint Check
  backend-lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-lint-check

  # Backend Maven Build
  backend-build-maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-build-maven

  # Backend Unit Test
  backend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-unit-test

  # Backend Image Build
  backend-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-build
        with:
          context: ${{ env.backend-dockerfile-path }}
          image-name: ${{ env.backend-image-name }}
          image-tag: ${{ env.backend-image-tag }}-${{ github.sha }}
          upload-artifact: "true"

  # Frontend Lint Check
  frontend-lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-lint-check

  # Frontend Unit Test
  frontend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-unit-test

  # Frontend npm Build
  frontend-build-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-build-npm

  # Frontend Image Build
  frontend-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-build
        with:
          context: ${{ env.frontend-dockerfile-path }}
          image-name: ${{ env.frontend-image-name }}
          image-tag: ${{ env.frontend-image-tag }}-${{ github.sha }}
          upload-artifact: "true"

  # Backend Dependency Scan (OWASP)
  backend-dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-dependency-scan
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Backend Image Scan
  backend-image-scan:
    runs-on: ubuntu-latest
    needs: backend-build-image
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-scan
        with:
          image-name: ${{ env.backend-image-name }}
          image-tag: ${{ env.backend-image-tag }}-${{ github.sha }}

  # Frontend Image Scan
  frontend-image-scan:
    runs-on: ubuntu-latest
    needs: frontend-build-image
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-scan
        with:
          image-name: ${{ env.frontend-image-name }}
          image-tag: ${{ env.frontend-image-tag }}-${{ github.sha }}

  # Smoke Test: run both images via docker compose, verify integration
  ci-smoke-test:
    runs-on: ubuntu-latest
    needs:
      - backend-unit-test
      - frontend-unit-test
      - backend-build-image
      - frontend-build-image
    defaults:
      run:
        working-directory: ${{ env.docker-compose-path }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.backend-image-name }}-image
          path: /tmp

      - name: Download frontend image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.frontend-image-name }}-image
          path: /tmp

      - name: Load images
        run: |
          docker load -i /tmp/${{ env.backend-image-name }}.tar
          docker load -i /tmp/${{ env.frontend-image-name }}.tar

      - name: Start stack
        env:
          BACKEND_IMAGE: ${{ env.backend-image-name }}:${{ env.backend-image-tag }}-${{ github.sha }}
          FRONTEND_IMAGE: ${{ env.frontend-image-name }}:${{ env.frontend-image-tag }}-${{ github.sha }}
        run: docker compose up -d --wait

      - name: Curl frontend root
        run: curl --fail --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/

      - name: Curl backend via frontend proxy
        run: curl --fail --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/api/healthz

      - name: Frontend stability probe (2 minutes)
        run: |
          end=$(( $(date +%s) + 60 ))
          while [ $(date +%s) -lt $end ]; do
            curl --fail --silent --show-error --max-time 5 http://localhost:8000/ > /dev/null
            sleep 5
          done

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  # Backend Image Push (sha)
  backend-image-push:
    runs-on: ubuntu-latest
    needs:
      - backend-lint-check
      - backend-build-maven
      - backend-unit-test
      - backend-dependency-scan
      - backend-image-scan
      - ci-smoke-test
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-push
        with:
          image-name: ${{ env.backend-image-name }}
          image-tag: ${{ env.backend-image-tag }}-${{ github.sha }}
          remote-tag: ${{ env.backend-image-tag }}-${{ github.sha }}
          registry-namespace: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

  # Frontend Image Push (sha)
  frontend-image-push:
    runs-on: ubuntu-latest
    needs:
      - frontend-lint-check
      - frontend-unit-test
      - frontend-build-npm
      - frontend-image-scan
      - ci-smoke-test
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-push
        with:
          image-name: ${{ env.frontend-image-name }}
          image-tag: ${{ env.frontend-image-tag }}-${{ github.sha }}
          remote-tag: ${{ env.frontend-image-tag }}-${{ github.sha }}
          registry-namespace: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs:
      # - backend-lint-check
      # - backend-build-maven
      # - backend-unit-test
      - backend-image-push
      # - frontend-lint-check
      # - frontend-unit-test
      # - frontend-build-npm
      - frontend-image-push
    if: always()
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}

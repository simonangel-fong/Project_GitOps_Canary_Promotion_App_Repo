name: 10-ci-backend

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
  push:
    branches-ignore:
      - main
    paths:
      - backend/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  backend-dockerfile-path: backend
  backend-image-name: gitops-risk-control-backend
  backend-image-tag: pr

jobs:
  # Backend Lint Check
  backend-lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-lint-check

  # Backend Unit Test
  backend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-unit-test

  # Backend Maven Build
  backend-build-maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/backend-build-maven

  # Backend Image Build
  backend-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-build
        with:
          context: ${{ env.backend-dockerfile-path }}
          image-name: ${{ env.backend-image-name }}
          image-tag: ${{ env.backend-image-tag }}-${{ github.event.pull_request.number || github.run_number }}

  notify:
    runs-on: ubuntu-latest
    needs:
      - backend-lint-check
      - backend-unit-test
      - backend-build-maven
      - backend-build-image
    if: always()
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}

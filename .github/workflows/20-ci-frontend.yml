name: 20-ci-frontend

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - frontend/**
  push:
    branches-ignore:
      - main
    paths:
      - frontend/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  frontend-dockerfile-path: frontend
  frontend-image-name: gitops-risk-control-frontend
  frontend-image-tag: pr

jobs:
  # Frontend Lint Check
  frontend-lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-lint-check

  # Frontend Unit Test
  frontend-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-unit-test

  # Frontend npm Build
  frontend-build-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/frontend-build-npm

  # Frontend Image Build
  frontend-build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/image-build
        with:
          context: ${{ env.frontend-dockerfile-path }}
          image-name: ${{ env.frontend-image-name }}
          image-tag: ${{ env.frontend-image-tag }}-${{ github.event.pull_request.number || github.run_number }}

  notify:
    runs-on: ubuntu-latest
    needs:
      - frontend-lint-check
      - frontend-unit-test
      - frontend-build-npm
      - frontend-build-image
    if: always()
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}
